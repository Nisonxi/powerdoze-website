<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PowerDoze</title>
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="plain.css">
  <script>
    (function() {
      var t = localStorage.getItem('pd-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body class="plain">

<nav class="p-nav">
  <div class="container p-nav-inner">
    <a href="./" class="p-logo">
      <img src="assets/icon.png" alt="">powerdoze
    </a>
    <div class="p-nav-links">
      <a href="features.html" data-i18n="navFeatures">Features</a>
      <a href="comparison.html" data-i18n="navFreeVsPro">Free vs Pro</a>
      <a href="use-cases.html" data-i18n="navUseCases">Use cases</a>
      <a href="index.html#pricing" data-i18n="navPricing">Pricing</a>
    </div>
    <div class="p-nav-right">
      <select id="lang-select" class="p-lang-select" aria-label="Language"></select>
      <button class="p-theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span id="theme-label">DARK</span>
      </button>
    </div>
  </div>
</nav>

<div class="p-auth">
  <div class="p-auth-card">
    <div class="p-auth-logo">
      <img src="assets/icon.png" alt="">
      <span>powerdoze</span>
    </div>

    <h1 data-i18n="authSignInTitle">Welcome back</h1>
    <p class="p-auth-sub" data-i18n="authSignInSub">Sign in to manage your Pro license and sync settings.</p>

    <button class="p-oauth-btn" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span data-i18n="authGoogle">Continue with Google</span>
    </button>
  </div>
</div>

<footer class="p-footer">
  <div class="container">
    <div class="p-footer-bottom">
      <span data-i18n="footer">© 2026 PowerDoze</span>
      <span><a href="mailto:PowerDozeSupport@gmail.com" data-i18n="contact">Support</a> · <a href="privacy.html" data-i18n="privacy">Privacy</a></span>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="i18n.js"></script>
<script src="supabase-config.js"></script>
<script>
  // Theme toggle
  (function() {
    var btn = document.getElementById('theme-toggle');
    var label = document.getElementById('theme-label');
    function set(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('pd-theme', theme);
      if (label) label.textContent = theme.toUpperCase();
    }
    set(localStorage.getItem('pd-theme') || 'dark');
    btn.addEventListener('click', function() {
      set(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  })();

  // Preserve ?redirect=buy across the OAuth round trip via sessionStorage.
  // index.html reads pd_post_login_action on load to auto-open the pay modal.
  const redirectParam = new URLSearchParams(window.location.search).get('redirect');
  if (redirectParam) {
    sessionStorage.setItem('pd_post_login_action', redirectParam);
  }

  // If already logged in, honor the redirect and otherwise go home.
  document.addEventListener('DOMContentLoaded', async () => {
    const user = await getUser();
    if (user) {
      window.location.href = '/';
    }
  });
</script>
</body>
</html>
