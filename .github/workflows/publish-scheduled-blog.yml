name: publish-scheduled-blog

on:
  schedule:
    - cron: '30 1 * * *'   # 每天 09:30（台北時間 UTC+8）檢查是否有到期文章
  workflow_dispatch: {}     # 後台「立即發佈」/ 手動觸發

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish due posts
        run: node scripts/publish-scheduled.js

      - name: Commit & push if changed
        id: commit
        run: |
          git config user.name "blog-scheduler[bot]"
          git config user.email "blog-scheduler[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to publish."
          else
            git commit -m "blog: 自動發佈排程文章（scheduled publish）"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Request Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN 推的 commit 不會觸發其他 workflow；保險起見直接跟 Pages 要一次 build
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" || true
