<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="24-hour ring with night hours highlighted">
  <rect width="1200" height="630" fill="#131316"/>
  <g stroke="#1B1B1F" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <g stroke="#34343A" stroke-width="2" fill="none">
    <path d="M40 64 V40 H64"/>
    <path d="M1136 40 H1160 V64"/>
    <path d="M40 566 V590 H64"/>
    <path d="M1160 566 V590 H1136"/>
  </g>
  <!-- 24h tick ring -->
  <circle cx="600" cy="290" r="123" fill="none" stroke="#5E5E5C" stroke-width="14" stroke-dasharray="4 28.2"/>
  <!-- night-hours arc -->
  <path d="M 527.5 164.4 A 145 145 0 0 0 527.5 415.6" fill="none" stroke="#F59E0B" stroke-width="9"/>
  <circle cx="600" cy="290" r="14" fill="#F59E0B"/>
  <circle cx="600" cy="290" r="56" fill="none" stroke="#26262A" stroke-width="4"/>
  <text x="84" y="576" font-family="Consolas, 'Cascadia Mono', ui-monospace, monospace" font-size="19" letter-spacing="5" fill="#8A8A86">POWERDOZE BLOG</text>
  <text x="1116" y="576" text-anchor="end" font-family="Consolas, 'Cascadia Mono', ui-monospace, monospace" font-size="19" letter-spacing="5" fill="#F59E0B">NO.04</text>
</svg>
