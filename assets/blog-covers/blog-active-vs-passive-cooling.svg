<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Fan versus heatsink fins, split design">
  <rect width="1200" height="630" fill="#131316"/>
  <g stroke="#1B1B1F" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <g stroke="#34343A" stroke-width="2" fill="none">
    <path d="M40 64 V40 H64"/>
    <path d="M1136 40 H1160 V64"/>
    <path d="M40 566 V590 H64"/>
    <path d="M1160 566 V590 H1136"/>
  </g>
  <!-- divider -->
  <line x1="600" y1="150" x2="600" y2="440" stroke="#34343A" stroke-width="4" stroke-dasharray="12 12"/>
  <!-- active: fan (amber) -->
  <circle cx="440" cy="290" r="84" fill="none" stroke="#F59E0B" stroke-width="28" stroke-dasharray="103 73"/>
  <circle cx="440" cy="290" r="20" fill="#2A1F0E" stroke="#F59E0B" stroke-width="7"/>
  <!-- passive: heatsink fins (grey) -->
  <g stroke="#5E5E5C" stroke-width="11">
    <line x1="700" y1="200" x2="700" y2="370"/>
    <line x1="736" y1="200" x2="736" y2="370"/>
    <line x1="772" y1="200" x2="772" y2="370"/>
    <line x1="808" y1="200" x2="808" y2="370"/>
    <line x1="844" y1="200" x2="844" y2="370"/>
  </g>
  <line x1="684" y1="392" x2="860" y2="392" stroke="#5E5E5C" stroke-width="11"/>
  <text x="84" y="576" font-family="Consolas, 'Cascadia Mono', ui-monospace, monospace" font-size="19" letter-spacing="5" fill="#8A8A86">POWERDOZE BLOG</text>
  <text x="1116" y="576" text-anchor="end" font-family="Consolas, 'Cascadia Mono', ui-monospace, monospace" font-size="19" letter-spacing="5" fill="#F59E0B">NO.11</text>
</svg>
