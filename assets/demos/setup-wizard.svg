<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Guided setup wizard: question, configure, done">
  <defs>
    <linearGradient id="sw-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="640" height="400" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="639" height="399" fill="none" stroke="#1b2230" stroke-width="1"/>

  <!-- connecting progress track -->
  <line x1="150" y1="200" x2="490" y2="200" stroke="#2a3240" stroke-width="4" stroke-linecap="round"/>
  <line x1="150" y1="200" x2="320" y2="200" stroke="url(#sw-amber)" stroke-width="4" stroke-linecap="round"/>

  <!-- STEP 1: question -->
  <g>
    <circle cx="150" cy="200" r="52" fill="#161d29" stroke="url(#sw-amber)" stroke-width="3"/>
    <text x="150" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" fill="#F59E0B" text-anchor="middle">?</text>
    <text x="150" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#8b95a5" text-anchor="middle">Answer</text>
  </g>

  <!-- STEP 2: configure (gear) -->
  <g transform="translate(320 200)">
    <circle r="52" fill="#161d29" stroke="url(#sw-amber)" stroke-width="3"/>
    <g fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <circle r="14"/>
      <g>
        <line x1="0" y1="-30" x2="0" y2="-22"/>
        <line x1="0" y1="30" x2="0" y2="22"/>
        <line x1="-30" y1="0" x2="-22" y2="0"/>
        <line x1="30" y1="0" x2="22" y2="0"/>
        <line x1="-21" y1="-21" x2="-15.5" y2="-15.5"/>
        <line x1="21" y1="21" x2="15.5" y2="15.5"/>
        <line x1="-21" y1="21" x2="-15.5" y2="15.5"/>
        <line x1="21" y1="-21" x2="15.5" y2="-15.5"/>
      </g>
    </g>
    <text x="0" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#8b95a5" text-anchor="middle">Configure</text>
  </g>

  <!-- STEP 3: done (check) -->
  <g transform="translate(490 200)">
    <circle r="52" fill="#1b2230" stroke="#2a3240" stroke-width="3"/>
    <path d="M -22 2 L -7 18 L 24 -16" fill="none" stroke="#5b6677" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#5b6677" text-anchor="middle">Apply</text>
  </g>
</svg>
