<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing payment… — PowerDoze</title>
  <meta name="description" content="Processing your PowerDoze payment.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="plain.css">
  <script>
    (function() {
      var t = localStorage.getItem('pd-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .pp-container {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; text-align: center; padding: 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--hair);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pp-text {
      color: var(--ink-3);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pp-success { color: #10b981; font-size: 14px; font-weight: 600; display: none; }
    .pp-error { color: #ef4444; font-size: 13px; display: none; }
  </style>
</head>
<body class="plain">
<div class="pp-container">
  <div class="spinner" id="spinner"></div>
  <p class="pp-text" id="status" data-i18n="ppr_processing">Processing your payment…</p>
  <p class="pp-success" id="success" data-i18n="ppr_success">&#10003; Payment successful. This window will close automatically.</p>
  <p class="pp-error" id="error"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="i18n.js"></script>
<script src="supabase-config.js"></script>
<script>
// Apply localization to static defaults before async work starts.
if (typeof applyLang === 'function' && typeof getLang === 'function') applyLang(getLang());

(async function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');    // PayPal order token
  var orderId = params.get('orderId'); // our order ID

  // PayPal appends 'token' param to return_url
  if (!orderId) orderId = token;

  if (params.get('purchase') === 'cancel') {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').textContent = t('ppr_cancelled');
    setTimeout(function() { window.close(); }, 2000);
    return;
  }

  if (!orderId) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = t('ppr_noOrder');
    return;
  }

  try {
    var session = await getSession();
    if (!session) {
      document.getElementById('status').textContent = t('ppr_loginRequired');
      document.getElementById('spinner').style.display = 'none';
      return;
    }

    var res = await fetch(SUPABASE_URL + '/functions/v1/capture-paypal', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token,
      },
      body: JSON.stringify({ orderId: orderId }),
    });

    var data = await res.json();

    if (data.status === 'success' || data.status === 'already_activated') {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('success').style.display = 'block';

      if (window.opener && !window.opener.closed) {
        window.opener.location.href = '/?purchase=success';
      }

      setTimeout(function() { window.close(); }, 2000);
    } else {
      throw new Error(data.error || 'Capture failed');
    }

  } catch (err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = t('ppr_errorPrefix') + err.message;

    setTimeout(function() {
      if (window.opener && !window.opener.closed) {
        window.opener.location.href = '/';
      }
      window.close();
    }, 4000);
  }
})();
</script>
</body>
</html>
