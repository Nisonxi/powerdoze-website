<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in… — PowerDoze</title>
  <meta name="description" content="Completing PowerDoze sign-in.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="plain.css">
  <script>
    (function() {
      var t = localStorage.getItem('pd-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .callback-container {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; padding: 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--hair);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .callback-text {
      color: var(--ink-3);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .callback-error { color: #ef4444; font-size: 13px; display: none; max-width: 400px; text-align: center; }
  </style>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "8530d7a5388c4418bc8398d7951f95b0"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body class="plain">
<div class="callback-container">
  <div class="spinner" id="spinner"></div>
  <p class="callback-text" id="status-text">Completing sign in…</p>
  <p class="callback-error" id="error-text"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="i18n.js"></script>
<script src="supabase-config.js"></script>
<script>
// Localize the static fallback text as soon as i18n.js is loaded.
document.getElementById('status-text').textContent = t('callbackSigningIn');

(async () => {
  try {
    // Supabase automatically picks up the tokens from the URL hash/params
    const { data: { session }, error } = await sbClient.auth.getSession();

    if (error) throw error;

    if (session) {
      // Pure Google-OAuth sign in — no recovery flow to handle.
      document.getElementById('status-text').textContent = t('callbackSuccess');
      setTimeout(() => { window.location.href = '/'; }, 800);
    } else {
      // No session yet — wait a moment and retry (OAuth can be async)
      await new Promise(r => setTimeout(r, 1500));
      const { data: { session: retrySession } } = await sbClient.auth.getSession();
      if (retrySession) {
        window.location.href = '/';
      } else {
        throw new Error(t('callbackUnable'));
      }
    }
  } catch (err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status-text').style.display = 'none';
    const errorEl = document.getElementById('error-text');
    errorEl.style.display = 'block';
    errorEl.textContent = err.message || t('callbackGenericError');
    setTimeout(() => { window.location.href = '/auth.html'; }, 3000);
  }
})();
</script>
</body>
</html>
